<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Um jardim para você</title>
<style>
  :root{
    --sky-top:#fdeef2;
    --sky-bottom:#fff8f2;
    --ground:#e7d9c3;
    --ground-dark:#d3c2a3;
    --stem:#7fa66b;
    --stem-dark:#5f8a4d;
    --leaf:#8fbd77;
    --petal:#ffc6d9;
    --petal-dark:#ff9dbc;
    --petal-center:#ffe08a;
    --text:#6b4a52;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    font-family: 'Georgia', 'Iowan Old Style', serif;
    background:var(--sky-bottom);
  }

  /* ---------- Landing ---------- */
  #start-screen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background: radial-gradient(ellipse at 50% 30%, #fff6f8 0%, #ffe9ef 60%, #ffd9e6 100%);
    z-index:20;
    transition: opacity 1.1s ease, visibility 1.1s ease;
    text-align:center;
    padding:24px;
  }
  #start-screen.hidden{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
  #start-screen h1{
    color:var(--text);
    font-size:clamp(1.6rem, 5vw, 2.6rem);
    font-weight:400;
    letter-spacing:0.5px;
    margin:0 0 10px;
  }
  #start-screen p{
    color:#a97c8a;
    font-size:1rem;
    margin:0 0 32px;
    font-style:italic;
  }
  #plant-btn{
    border:none;
    cursor:pointer;
    background:var(--petal-dark);
    color:#fff;
    font-family:inherit;
    font-size:1.05rem;
    padding:14px 34px;
    border-radius:999px;
    box-shadow:0 8px 20px rgba(255,157,188,0.45);
    transition: transform .25s ease, box-shadow .25s ease;
    letter-spacing:0.5px;
  }
  #plant-btn:hover{
    transform: translateY(-3px) scale(1.03);
    box-shadow:0 12px 26px rgba(255,157,188,0.55);
  }
  #plant-btn:active{ transform: translateY(0) scale(0.98); }
  .seed-emoji{
    font-size:2.2rem;
    margin-bottom:14px;
    display:inline-block;
    animation: sway 3s ease-in-out infinite;
  }
  @keyframes sway{
    0%,100%{ transform: rotate(-6deg); }
    50%{ transform: rotate(6deg); }
  }

  /* ---------- Garden Scene ---------- */
  #scene{
    position:fixed;
    inset:0;
    background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 55%, var(--sky-bottom) 100%);
    opacity:0;
    transition: opacity 1.2s ease;
  }
  #scene.visible{ opacity:1; }

  .cloud{
    position:absolute;
    background:#fff;
    border-radius:50px;
    opacity:0.7;
    filter: blur(1px);
    animation: drift linear infinite;
  }
  @keyframes drift{
    from{ transform: translateX(-10vw); }
    to{ transform: translateX(110vw); }
  }

  .sun{
    position:absolute;
    top:6%;
    right:10%;
    width:90px;
    height:90px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 35%, #fff6d9, #ffe08a 60%, #ffd166 100%);
    box-shadow: 0 0 60px 20px rgba(255,224,138,0.55);
    animation: sunrise 2.5s ease-out;
  }
  @keyframes sunrise{
    from{ transform: translateY(60px) scale(0.6); opacity:0; }
    to{ transform: translateY(0) scale(1); opacity:1; }
  }

  #ground{
    position:absolute;
    left:0; right:0; bottom:0;
    height:26%;
    background: linear-gradient(to bottom, var(--ground) 0%, var(--ground-dark) 100%);
    border-top-left-radius: 50% 18px;
    border-top-right-radius: 50% 18px;
  }

  #title-caption{
    position:absolute;
    top:4%;
    left:50%;
    transform: translateX(-50%);
    color:var(--text);
    text-align:center;
    z-index:5;
    padding: 0 20px;
    max-width: 640px;
    width:90%;
  }
  #title-caption .birthday-msg{
    font-size:clamp(1.3rem, 4.2vw, 2.1rem);
    font-weight:400;
    letter-spacing:0.4px;
    opacity:0;
    animation: fadeIn 1.4s ease forwards;
    animation-delay: 3.2s;
    margin:0 0 6px;
  }
  #title-caption .sub-msg{
    font-size:clamp(0.95rem, 2.6vw, 1.15rem);
    font-style:italic;
    color:#b58592;
    opacity:0;
    animation: fadeIn 1.4s ease forwards;
    animation-delay: 4.3s;
    margin:0 0 14px;
  }
  #title-caption .verse-ref{
    font-size:clamp(0.85rem, 2.3vw, 1rem);
    font-weight:700;
    letter-spacing:0.6px;
    text-transform:uppercase;
    color:var(--petal-dark);
    opacity:0;
    animation: fadeIn 1.4s ease forwards;
    animation-delay: 5.4s;
    margin:0 0 6px;
  }
  #title-caption .verse-text{
    font-size:clamp(0.85rem, 2.4vw, 1.05rem);
    line-height:1.5;
    color:var(--text);
    opacity:0;
    animation: fadeIn 1.6s ease forwards;
    animation-delay: 6s;
    margin:0;
  }
  @keyframes fadeIn{
    to{ opacity:1; }
  }

  .plant{
    position:absolute;
    bottom:22%;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .stem{
    width:5px;
    background: linear-gradient(to top, var(--stem-dark), var(--stem));
    border-radius: 3px 3px 0 0;
    height:0;
    transform-origin:bottom center;
    animation: grow-stem 1.3s cubic-bezier(.34,1.2,.4,1) forwards;
  }
  @keyframes grow-stem{
    from{ height:0; }
    to{ height: var(--stem-h); }
  }

  .leaf{
    position:absolute;
    width:22px;
    height:14px;
    background:var(--leaf);
    border-radius: 0 60% 0 60%;
    opacity:0;
    animation: leaf-pop .6s ease forwards;
  }
  .leaf.left{ border-radius: 60% 0 60% 0; }
  @keyframes leaf-pop{
    from{ opacity:0; transform: scale(0) rotate(0deg); }
    to{ opacity:1; transform: scale(1) rotate(var(--leaf-rot,0deg)); }
  }

  .flower{
    position:relative;
    width:52px;
    height:52px;
    opacity:0;
    transform: scale(0);
    animation: bloom 1.1s cubic-bezier(.3,1.4,.4,1) forwards;
  }
  @keyframes bloom{
    0%{ opacity:0; transform: scale(0) rotate(-20deg); }
    60%{ opacity:1; transform: scale(1.15) rotate(6deg); }
    100%{ opacity:1; transform: scale(1) rotate(0deg); }
  }
  .petal{
    position:absolute;
    width:24px;
    height:32px;
    background: radial-gradient(circle at 50% 20%, var(--petal) 0%, var(--petal-dark) 100%);
    border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
    top:50%;
    left:50%;
    transform-origin: 50% 100%;
  }
  .petal:nth-child(1){ transform: translate(-50%,-100%) rotate(0deg); }
  .petal:nth-child(2){ transform: translate(-50%,-100%) rotate(72deg); }
  .petal:nth-child(3){ transform: translate(-50%,-100%) rotate(144deg); }
  .petal:nth-child(4){ transform: translate(-50%,-100%) rotate(216deg); }
  .petal:nth-child(5){ transform: translate(-50%,-100%) rotate(288deg); }
  .flower-center{
    position:absolute;
    width:16px;
    height:16px;
    background: radial-gradient(circle, #fff3c4, var(--petal-center));
    border-radius:50%;
    top:50%;
    left:50%;
    transform: translate(-50%,-50%);
    box-shadow: 0 0 8px rgba(255,224,138,0.7);
  }

  .grass-blade{
    position:absolute;
    bottom:20.5%;
    width:3px;
    background: var(--stem);
    border-radius: 3px 3px 0 0;
    height:0;
    transform-origin:bottom center;
    animation: grow-grass 0.9s ease forwards;
  }
  @keyframes grow-grass{
    to{ height: var(--gh); }
  }

  .butterfly{
    position:absolute;
    font-size:1.4rem;
    opacity:0;
    animation: flutter-in 1s ease forwards, flutter-move 6s ease-in-out infinite;
  }
  @keyframes flutter-in{
    to{ opacity:1; }
  }
  @keyframes flutter-move{
    0%,100%{ transform: translate(0,0) rotate(0deg); }
    25%{ transform: translate(18px,-14px) rotate(8deg); }
    50%{ transform: translate(0,-24px) rotate(-6deg); }
    75%{ transform: translate(-18px,-10px) rotate(6deg); }
  }

  #replay-wrap{
    position:absolute;
    bottom:4%;
    left:50%;
    transform: translateX(-50%);
    opacity:0;
    animation: fadeIn 1s ease forwards;
    animation-delay: 8s;
    z-index:6;
  }
  #replay-btn{
    border:none;
    cursor:pointer;
    background: rgba(255,255,255,0.75);
    color:var(--text);
    font-family:inherit;
    font-size:0.9rem;
    padding:9px 20px;
    border-radius:999px;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
  }
  #replay-btn:hover{ background:#fff; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
<body>

  <div id="start-screen">
    <span class="seed-emoji">🌱</span>
    <h1>Um jardim para você</h1>
    <p>clique para ver florescer</p>
    <button id="plant-btn">plantar o jardim</button>
  </div>

  <div id="scene">
    <div class="sun"></div>
    <div class="cloud" style="width:110px;height:36px;top:10%;left:-15%;animation-duration:38s;"></div>
    <div class="cloud" style="width:80px;height:28px;top:18%;left:-25%;animation-duration:50s;animation-delay:-15s;"></div>
    <div id="ground"></div>
    <div id="title-caption">
      <p class="birthday-msg">Happy birthday bibii 💗🌸</p>
      <p class="sub-msg">flores pra mais bela flor do jardim</p>
      <p class="verse-ref">Jeremias 29:11</p>
      <p class="verse-text">"Porque eu bem sei os planos que tenho para vocês, diz o Senhor; planos de paz e não de mal, para lhes dar um futuro e uma esperança."</p>
    </div>
    <div id="plants-container" style="position:absolute; inset:0;"></div>
    <div id="replay-wrap">
      <button id="replay-btn">ver de novo</button>
    </div>
  </div>

<script>
const startScreen = document.getElementById('start-screen');
const scene = document.getElementById('scene');
const container = document.getElementById('plants-container');
const plantBtn = document.getElementById('plant-btn');
const replayBtn = document.getElementById('replay-btn');

function rand(min, max){ return Math.random() * (max - min) + min; }

function buildGarden(){
  container.innerHTML = '';

  // grass blades scattered along the ground edge
  const grassCount = 40;
  for(let i=0;i<grassCount;i++){
    const blade = document.createElement('div');
    blade.className = 'grass-blade';
    const left = rand(2, 98);
    const h = rand(10, 26);
    blade.style.left = left + '%';
    blade.style.setProperty('--gh', h + 'px');
    blade.style.animationDelay = rand(0.2, 1.4) + 's';
    blade.style.transform = `rotate(${rand(-8,8)}deg)`;
    container.appendChild(blade);
  }

  // flowering plants
  const plantCount = 7;
  const positions = [10, 22, 35, 50, 65, 78, 90];
  positions.forEach((leftPct, i) => {
    const delay = 1.0 + i * 0.45 + rand(-0.1,0.15);
    const stemHeight = rand(70, 130);

    const plant = document.createElement('div');
    plant.className = 'plant';
    plant.style.left = leftPct + '%';
    plant.style.transform = 'translateX(-50%)';

    const stem = document.createElement('div');
    stem.className = 'stem';
    stem.style.setProperty('--stem-h', stemHeight + 'px');
    stem.style.animationDelay = delay + 's';

    // leaves
    const leaf1 = document.createElement('div');
    leaf1.className = 'leaf left';
    leaf1.style.left = '-16px';
    leaf1.style.bottom = (stemHeight*0.35) + 'px';
    leaf1.style.setProperty('--leaf-rot','-20deg');
    leaf1.style.animationDelay = (delay + 0.5) + 's';

    const leaf2 = document.createElement('div');
    leaf2.className = 'leaf';
    leaf2.style.right = '-16px';
    leaf2.style.bottom = (stemHeight*0.55) + 'px';
    leaf2.style.left = 'auto';
    leaf2.style.setProperty('--leaf-rot','20deg');
    leaf2.style.animationDelay = (delay + 0.65) + 's';

    stem.appendChild(leaf1);
    stem.appendChild(leaf2);

    // flower
    const flower = document.createElement('div');
    flower.className = 'flower';
    flower.style.position = 'absolute';
    flower.style.bottom = stemHeight + 'px';
    flower.style.left = '50%';
    flower.style.transform = 'translateX(-50%)';
    flower.style.animationDelay = (delay + 0.9) + 's';

    for(let p=0;p<5;p++){
      const petal = document.createElement('div');
      petal.className = 'petal';
      flower.appendChild(petal);
    }
    const center = document.createElement('div');
    center.className = 'flower-center';
    flower.appendChild(center);

    plant.appendChild(stem);
    plant.appendChild(flower);
    container.appendChild(plant);
  });

  // butterflies appear late
  const butterflyEmojis = ['🦋','🦋'];
  butterflyEmojis.forEach((emoji, i) => {
    const b = document.createElement('div');
    b.className = 'butterfly';
    b.textContent = emoji;
    b.style.left = (25 + i*40) + '%';
    b.style.top = (35 + i*8) + '%';
    b.style.animationDelay = (4.2 + i*0.6) + 's, ' + (5 + i) + 's';
    container.appendChild(b);
  });
}

function startGarden(){
  buildGarden();
  startScreen.classList.add('hidden');
  scene.classList.add('visible');
}

plantBtn.addEventListener('click', startGarden);
replayBtn.addEventListener('click', startGarden);
</script>

</body>
</html>
